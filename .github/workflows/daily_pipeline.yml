name: Daily Lead Pipeline

on:
  schedule:
    # Runs at :22 and :52 of each hour, 12:00–22:00 UTC (8 AM – 6 PM ET)
    - cron: '22,52 12-22 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run pipeline (all sources)
        run: python -m pipeline.main --once
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          MIAMI_DADE_DERM_ACTIVE: 'true'
          FORT_LAUDERDALE_ACTIVE: 'true'
          CITY_OF_MIAMI_ACTIVE: 'true'
